# ============================================================
# LLM Provider & Model Configuration
# ============================================================
# This file defines providers, models, and agent-type mappings.
# On application startup, the loader will sync these definitions
# into the database (create or update by name).  Records that
# exist in DB but are NOT listed here are left untouched, so
# API-created entries remain intact.
#
# Environment variable substitution is supported:
#   api_key: ${DEEPSEEK_API_KEY}
# will read from process env / .env file automatically.
# ============================================================

# --- Global defaults (applied to every provider/model unless overridden) ---
defaults:
  temperature: "0.7"
  is_active: true

# ============================================================
# Providers
# ============================================================
providers:
  - name: deepseek
    display_name: DeepSeek
    api_base: https://api.deepseek.com/v1
    api_key: ${DEEPSEEK_API_KEY}
    description: DeepSeek official API
    logo: ""

  - name: openai
    display_name: OpenAI
    api_base: https://api.openai.com/v1
    api_key: ${OPENAI_API_KEY}
    description: OpenAI official API
    logo: ""

  - name: moonshot
    display_name: Moonshot (Kimi)
    api_base: https://api.moonshot.cn/v1
    api_key: ${MOONSHOT_API_KEY}
    description: Moonshot AI (Kimi) API
    logo: ""

# ============================================================
# Models  (provider is referenced by provider.name)
# For embedding / rerank models:
#   - Set model_type to "embedding" or "rerank"
#   - Set model_path for local loading (HuggingFace ID or filesystem path)
#   - Set embedding_dimension for embedding models (0 = auto-detect)
#   - If model_path is set, provider is optional (loaded locally)
#   - If model_path is empty, provider API will be used
# ============================================================
models:
  # --- Chat models ---
  - name: deepseek-v4-pro
    provider: deepseek
    display_name: deepseek-v4-pro

  - name: deepseek-v4-flash
    provider: deepseek
    display_name: deepseek-v4-flash

  - name: deepseek-chat
    provider: deepseek
    display_name: DeepSeek Chat

  - name: deepseek-reasoner
    provider: deepseek
    display_name: DeepSeek Reasoner

  - name: gpt-4o
    provider: openai
    display_name: GPT-4o

  - name: gpt-4o-mini
    provider: openai
    display_name: GPT-4o Mini

  # --- Multimodal models ---
  - name: deepseek-vl-chat
    provider: deepseek
    display_name: DeepSeek VL Chat
    model_type: multimodal

  # - name: gpt-4o
  #   provider: openai
  #   display_name: GPT-4o Vision
  #   model_type: multimodal

  # - name: qwen-vl-plus
  #   provider: dashscope
  #   display_name: Qwen VL Plus
  #   model_type: multimodal

  - name: moonshot-v1-8k
    provider: moonshot
    display_name: Moonshot V1 8K

  # --- Embedding models (local) ---
  - name: bge-small-zh
    display_name: BGE Small Chinese
    model_type: embedding
    model_path: BAAI/bge-small-zh-v1.5
    embedding_dimension: 512

  # - name: bge-large-zh
  #   display_name: BGE Large Chinese
  #   model_type: embedding
  #   model_path: BAAI/bge-large-zh-v1.5
  #   embedding_dimension: 1024

  # --- Embedding models (API) ---
  # - name: text-embedding-3-small
  #   provider: openai
  #   display_name: OpenAI Embedding 3 Small
  #   model_type: embedding
  #   embedding_dimension: 1536

  # --- Rerank models (local) ---
  # - name: bge-reranker-base
  #   display_name: BGE Reranker Base
  #   model_type: rerank
  #   model_path: BAAI/bge-reranker-base

  # --- Rerank models (API) ---
  # - name: cohere-rerank
  #   provider: cohere
  #   display_name: Cohere Rerank
  #   model_type: rerank

# ============================================================
# Agent-type model mappings
# ============================================================
# Each entry binds an agent_type to a model (referenced by
# provider.name / model.name).  Higher priority wins.
# ============================================================
mappings:
  - agent_type: chat
    provider: deepseek
    model: deepseek-chat
    priority: 10

  - agent_type: chat
    provider: deepseek
    model: deepseek-v4-pro
    priority: 0

  - agent_type: translation
    provider: deepseek
    model: deepseek-v4-pro
    priority: 0

  - agent_type: translation
    provider: openai
    model: gpt-4o-mini
    priority: 10

  - agent_type: customer_service
    provider: deepseek
    model: deepseek-chat
    priority: 10

  - agent_type: smart_assistant
    provider: deepseek
    model: deepseek-chat
    priority: 10
